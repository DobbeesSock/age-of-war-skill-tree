<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Age of War Companion</title>

<style>
body {
    background:#111;
    color:#e6d3a3;
    font-family:serif;
    text-align:center;
}

h1 { color:#d4af37; }

button {
    padding:8px 12px;
    margin:5px;
    background:#a67c52;
    border:none;
    cursor:pointer;
}

/* TOP BAR */
#topbar {
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
}

/* TREE */
.tree {
    display:none;
    justify-content:space-around;
    margin-top:20px;
}

.tree.active { display:flex; }

.branch {
    display:flex;
    flex-direction:column;
    gap:10px;
}

.node {
    background:#3a2a1a;
    border:2px solid #c9a66b;
    padding:8px;
    width:200px;
    border-radius:6px;
    text-align:left;
    cursor:pointer;
}

.node h3 { margin:0; color:#ffd700; font-size:14px; }
.node p { margin:5px 0; font-size:12px; }

.locked { opacity:.4; }
.available { box-shadow:0 0 6px #c9a66b; }
.unlocked { background:#c9a66b; color:black; }

</style>
</head>

<body>

<h1>Age of War Companion</h1>

<!-- PROFILE -->
<div id="topbar">
    <input id="playerName" placeholder="Player Name">
    <button onclick="createProfile()">Create/Load</button>

    <select id="profileSelect" onchange="loadProfile()"></select>
</div>

<!-- FACTION -->
<div>
    <button onclick="selectFaction('dwarves')">Dwarves</button>
</div>

<div id="smDisplay">SM: 15</div>

<div>
    <button onclick="changeSM(-1)">-1</button>
    <button onclick="changeSM(1)">+1</button>
    <button onclick="changeSM(-5)">-5</button>
    <button onclick="changeSM(5)">+5</button>
</div>

<!-- ================= DWARVES ================= -->

<div id="dwarves" class="tree active">

<div class="branch">
<div class="node available" data-id="m1" data-cost="1">
<h3>Shield Wall Doctrine</h3>
<p>+1 Retaliate near allies/structures</p>
</div>

<div class="node locked" data-id="m2" data-cost="3" data-prereq="m1">
<h3>Stand the Breach</h3>
<p>Survive at 1 HP once per phase</p>
</div>
</div>

<div class="branch">
<div class="node available" data-id="m3" data-cost="2">
<h3>Measured Advance</h3>
<p>+1 OD if moved ≤6</p>
</div>

<div class="node locked" data-id="m4" data-cost="4" data-prereq="m3">
<h3>Break the Line</h3>
<p>+1 damage vs armor</p>
</div>
</div>

</div>

<button onclick="resetProfile()">Reset Profile</button>


<script>

// GLOBAL STATE
let currentProfile = null;
let data = JSON.parse(localStorage.getItem("profiles")) || {};
let sm = 15;

// CREATE / LOAD PROFILE
function createProfile(){
    let name = document.getElementById("playerName").value;
    if(!name) return;

    if(!data[name]){
        data[name] = { sm:15, skills:{} };
    }

    currentProfile = name;

    saveProfiles();
    refreshProfiles();

    // 👇 THIS LINE FIXES EVERYTHING
    document.getElementById("profileSelect").value = name;

    loadProfile();
}

// LOAD PROFILE
function loadProfile(){
    let select = document.getElementById("profileSelect");
    let name = select.value;

    if(!name) return;

    currentProfile = name;
    let profile = data[name];

    sm = profile.sm;
    applySkills();
    updateSM();
}

// APPLY SAVED SKILLS
function applySkills(){
    document.querySelectorAll(".node").forEach(n=>{
        n.classList.remove("unlocked","available","locked");

        let id = n.dataset.id;
        if(data[currentProfile].skills[id]){
            n.classList.add("unlocked");
        } else {
            n.classList.add("locked");
        }
    });

    updateAvailability();
}

// CLICK LOGIC
document.querySelectorAll(".node").forEach(node=>{
    node.addEventListener("click", ()=>{

        if(!currentProfile) return;

        let id = node.dataset.id;
        let cost = parseInt(node.dataset.cost);

        // REMOVE SKILL
        if(node.classList.contains("unlocked")){
            delete data[currentProfile].skills[id];
            sm += cost;
        }

        // ADD SKILL
        else if(node.classList.contains("available")){
            if(sm >= cost){
                data[currentProfile].skills[id] = true;
                sm -= cost;
            }
        }

        saveProfiles();
        applySkills();
        updateSM();
    });
});

// AVAILABILITY
function updateAvailability(){
    document.querySelectorAll(".node").forEach(n=>{
        if(n.classList.contains("unlocked")) return;

        let prereq = n.dataset.prereq;

        if(!prereq || data[currentProfile].skills[prereq]){
            n.classList.add("available");
            n.classList.remove("locked");
        }
    });
}

// UI
function updateSM(){
    document.getElementById("smDisplay").innerText = "SM: " + sm;
}

function changeSM(amount){
    if(!currentProfile) return;

    sm += amount;

    if(sm < 0) sm = 0;

    saveProfiles();
    updateSM();
}

// SAVE
function saveProfiles(){
    data[currentProfile].sm = sm;
    localStorage.setItem("profiles", JSON.stringify(data));
}

// PROFILE LIST
function refreshProfiles(){
    let select = document.getElementById("profileSelect");
    select.innerHTML = "";

    for(let name in data){
        let opt = document.createElement("option");
        opt.value = name;
        opt.innerText = name;
        select.appendChild(opt);
    }
}

// RESET
function resetProfile(){
    if(!currentProfile) return;

    data[currentProfile] = { sm:15, skills:{} };
    saveProfiles();
    loadProfile();
}

// FACTION SWITCH
function selectFaction(f){
    document.querySelectorAll(".tree").forEach(t=>t.classList.remove("active"));
    document.getElementById(f).classList.add("active");
}

// INIT
refreshProfiles();

</script>

</body>
</html>
